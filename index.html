<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  
  <!-- Apple Web App / PWA Meta Tags for full-screen iPad experience -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Lax Board" />
  
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>Lacrosse Soundboard</title>
  <style>
    :root{
      --bg: #ffffff;
      --text: #111;
      --muted: #555;
      --border: #d9d9d9;

      --green: #0b7a30;
      --greenTint: rgba(11,122,48,0.10);

      --red: #b30000;
      --redTint: rgba(179,0,0,0.10);

      --purple: #5b2d8e;
      --purpleTint: rgba(91,45,142,0.10);

      --btnBg: #fff;
      --btnBorder: #cfcfcf;
      --btnShadow: rgba(0,0,0,0.08);
    }

    body{
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      /* Prevent text selection and bouncing on iPad */
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior-y: none;
    }

    header{
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      /* Add safe-area padding for modern iPads/iPhones */
      padding-top: max(14px, env(safe-area-inset-top));
    }

    h1{
      margin: 0 0 10px 0;
      font-size: 26px;
      line-height: 1.1;
    }

    .banner{
      width: 100%;
      border-radius: 10px;
      padding: 14px 16px;
      font-weight: 800;
      text-align: center;
      letter-spacing: 1px;
      font-size: 20px;
      color: #fff;
      user-select: none;
    }
    .banner.song{ background: var(--green); }
    .banner.goal{ background: var(--red); }
    .banner.playlist{ background: var(--purple); }

    .tabbtn .playlistText{ color: var(--purple); font-weight: 800; }

    .toolbar{
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .tabbtn, .ctlbtn{
      border: 1px solid var(--btnBorder);
      background: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 16px;
      cursor: pointer;
      user-select: none;
      box-shadow: 0 2px 8px var(--btnShadow);
    }

    .ctlbtn:disabled{
      opacity: 0.85;
      cursor: default;
    }

    /* Stop button should look like a stop sign */
    #stopBtn{
      background: var(--red);
      color: #fff;
      border-color: rgba(0,0,0,0.10);
      font-weight: 800;
    }

    /* Visual feedback when Stop has been clicked */
    #stopBtn.stopping{
      background: #7f0000;
      border-color: rgba(0,0,0,0.20);
      outline: 2px solid rgba(0,0,0,0.20);
    }
    
    #cacheBtn {
      font-weight: 600;
      color: #333;
    }

    .tabbtn.active{
      outline: 2px solid rgba(0,0,0,0.06);
    }

    .tabbtn .songsText{ color: var(--green); font-weight: 800; }
    .tabbtn .goalText{ color: var(--red); font-weight: 800; }

    .status{
      padding: 10px 16px 0;
      color: var(--muted);
      font-size: 15px;
      min-height: 22px;
    }

    .gridwrap{
      padding: 12px 16px 16px;
      /* Add safe padding for bottom of iPad screens */
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }
    .grid{
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(6, minmax(130px, 1fr));
    }

    @media (max-width: 1100px){
      .grid{ grid-template-columns: repeat(4, minmax(140px, 1fr)); }
    }
    @media (max-width: 750px){
      .grid{ grid-template-columns: repeat(3, minmax(120px, 1fr)); }
    }
    @media (max-width: 520px){
      .grid{ grid-template-columns: repeat(2, minmax(140px, 1fr)); }
    }

    /* Playlist-specific grid: more columns, tighter */
    @media (max-width: 750px){
      .grid.playlist-grid{ grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 520px){
      .grid.playlist-grid{ grid-template-columns: repeat(3, 1fr); }
    }

    .card{
      border: 1px solid var(--btnBorder);
      border-radius: 14px;
      background: var(--btnBg);
      box-shadow: 0 6px 14px var(--btnShadow);
      padding: 10px;
      user-select: none;
      cursor: pointer;
      position: relative;
      transition: transform 0.05s ease, background 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
      
      /* Enhance touch dragging */
      touch-action: manipulation;
      -webkit-touch-callout: none;
      -webkit-user-drag: element;
    }

    /* Ensures drag events properly trigger on the main card container */
    .card > * {
      pointer-events: none;
    }

    /* Drag and Drop visual feedback */
    .card.dragging {
      opacity: 0.4;
      transform: scale(0.95);
    }
    .card.over {
      transform: scale(1.03);
      outline: 3px dashed var(--active-theme);
      outline-offset: -3px;
      opacity: 0.8;
    }

    /* Playlist-specific grid: 6 columns, tight gaps */
    .grid.playlist-grid{
      gap: 6px;
      grid-template-columns: repeat(6, 1fr);
    }

    /* Playlist cards */
    .playlist-grid .card{
      border-radius: 8px !important;
      padding: 6px !important;
      box-shadow: 0 2px 5px var(--btnShadow) !important;
      height: 110px !important;
      box-sizing: border-box !important;
      display: flex !important;
      flex-direction: column !important;
      justify-content: center !important;
      overflow: hidden !important;
    }
    .playlist-grid .num{
      font-size: 17px !important;
      font-weight: 800 !important;
      padding: 8px 6px !important;
      border: 1px solid var(--btnBorder) !important;
      background: rgba(255,255,255,0.9) !important;
      border-radius: 7px !important;
      line-height: 1.25 !important;
      display: -webkit-box !important;
      -webkit-line-clamp: 2 !important;
      -webkit-box-orient: vertical !important;
      overflow: hidden !important;
    }
    .playlist-grid .name{
      font-size: 11px !important;
      font-weight: 400 !important;
      margin-top: 4px !important;
      min-height: 0 !important;
      white-space: nowrap !important;
      overflow: hidden !important;
      text-overflow: ellipsis !important;
      color: #555 !important;
    }

    /* Card Mode Themes */
    .card.songModeTint{ 
      background: var(--greenTint); 
      --active-theme: var(--green);
    }
    .card.playlistModeTint{ 
      background: var(--purpleTint); 
      --active-theme: var(--purple);
    }
    .card.goalModeTint{ 
      background: var(--redTint); 
      --active-theme: var(--red);
    }

    /* Custom Color Overrides */
    .card.has-custom-color {
      background: var(--custom-bg) !important;
      border-color: var(--custom-border) !important;
    }
    .card.has-custom-color.playing {
      border-color: var(--active-theme) !important;
    }

    .card.missing{
      opacity: 0.5; /* Increased opacity for better readability */
      filter: grayscale(1);
    }
    .card.missing .num{
      color: #444; /* Darkened text color */
      border-style: dashed;
      background: rgba(235,235,235,0.95);
    }
    .card.missing .name{
      color: #444; /* Darkened text color */
      font-weight: 500;
    }

    .card:active{ transform: scale(0.985); }

    .card.flash{ outline: 3px solid rgba(0,0,0,0.14); }

    /* Active Playback State Elements */
    .card.playing{
      border-color: var(--active-theme);
      transform: scale(1.02);
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
      z-index: 2; /* Pop over neighboring cards */
    }
    
    .play-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255, 255, 255, 0.75); /* Frosted glass effect */
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      border-radius: inherit;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .card.playing .play-overlay {
      display: flex;
    }

    .progress-ring {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      /* Fills based on the --progress variable updated by JS */
      background: conic-gradient(var(--active-theme) var(--progress, 0%), #374151 0%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.25);
    }

    .progress-ring-inner {
      width: 44px;
      height: 44px;
      background: #111827; /* Dark background matching the uploaded icon */
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .pause-bar {
      width: 6px;
      height: 18px;
      background: var(--active-theme);
      border-radius: 2px;
    }

    .num{
      font-size: 22px;
      font-weight: 900;
      text-align: center;
      padding: 12px 8px;
      border-radius: 10px;
      border: 1px solid var(--btnBorder);
      background: rgba(255,255,255,0.8);
    }

    .name{
      margin-top: 8px;
      text-align: center;
      font-size: 14px;
      color: #222;
      min-height: 18px;
    }

    .confirmbar{
      /* Top, under the buttons */
      position: sticky;
      top: 0;
      padding: 10px 12px;
      background: rgba(255,255,255,0.97);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 10px 24px rgba(0,0,0,0.08);
      display: none;
      z-index: 999;
      backdrop-filter: blur(8px);
    }

    .confirmbar-inner{
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .confirmtext{
      flex: 1 1 260px;
      font-size: 16px;
      font-weight: 700;
      color: #111;
    }

    .confirmbtn{
      border: 1px solid var(--btnBorder);
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 16px;
      box-shadow: 0 2px 8px var(--btnShadow);
      background: #fff;
      user-select: none;
    }

    .confirmbtn.cancel{ color: #333; }
    .confirmbtn.go{
      background: var(--red);
      color: #fff;
      border-color: rgba(0,0,0,0.08);
      font-weight: 800;
    }

    /* Custom Color Picker Modal Styles */
    .color-picker-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .color-picker-modal {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      width: 90%;
      max-width: 320px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .color-swatch-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin: 20px 0;
    }
    .color-swatch {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform 0.1s;
      box-shadow: 0 3px 6px rgba(0,0,0,0.1);
    }
    .color-swatch:active {
      transform: scale(0.9);
    }
    .color-swatch.default-swatch {
      background: #f8f9fa;
      border: 2px dashed #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #999;
      line-height: 1;
    }
  </style>
</head>

<body>
  <header>
    <h1>Lacrosse Soundboard</h1>
    <div id="modeBanner" class="banner song">SONG MODE</div>
  </header>

  <div class="toolbar">
    <button id="songsTab" class="tabbtn active" type="button"><span class="songsText">Songs</span></button>
    <button id="goalTab" class="tabbtn" type="button"><span class="goalText">Goal Call</span></button>
    <button id="playlistTab" class="tabbtn" type="button"><span class="playlistText">Playlist</span></button>
    <button id="stopBtn" class="ctlbtn" type="button">Stop (Fade)</button>
    <button id="cacheBtn" class="ctlbtn" type="button" title="Download all audio to device for offline use">Offline Sync</button>
  </div>

  <!-- Goal confirm banner (shows only in Goal mode) -->
  <div id="confirmBar" class="confirmbar">
    <div class="confirmbar-inner">
      <div id="confirmText" class="confirmtext">Confirm GOAL call:</div>
      <button id="confirmCancel" class="confirmbtn cancel" type="button">Cancel</button>
      <button id="confirmGo" class="confirmbtn go" type="button">PLAY GOAL</button>
    </div>
  </div>

  <div id="status" class="status"></div>

  <div class="gridwrap">
    <div id="grid" class="grid"></div>
  </div>

  <!-- Color Picker Modal -->
  <div id="colorPickerOverlay" class="color-picker-overlay">
    <div class="color-picker-modal">
      <h3 style="margin-top:0; font-size:20px;">Button Color</h3>
      <p style="font-size:14px; color:#666; margin-top:-10px;">Pick a color for this button.</p>
      <div id="swatchContainer" class="color-swatch-grid"></div>
      <button class="ctlbtn" style="width:100%; padding:12px; font-weight:bold;" onclick="closeColorPicker()">Close</button>
    </div>
  </div>

      { title: "Ain't Talkin' 'Bout Love (Instrumental)",    artist: "Van Halen",                                file: "Van Halen - Ain't Talkin' 'Bout Love (Instrumental).mp3" },
      { title: "Y'all Ready for This (Space Jam Theme)",     artist: "",                                         file: "Y'all ready for this - (Space Jam Theme).mp3" },
      { title: "Situation",                                  artist: "Yaz",                                      file: "Yaz - Situation.mp3" },
    ];

    /*****************************************************************
     * State Layout Mapping (Allows visual dragging & saving order)
     *****************************************************************/
    const songsLayout = players.map(p => ({ ...p, _type: 'player', _dragId: 'player_' + p.num }));
    extras.forEach(x => songsLayout.push({ ...x, _type: 'extra', _dragId: 'extra_' + x.key }));
    const playlistLayout = playlist.map((p, i) => ({ ...p, _type: 'playlist', _dragId: 'playlist_' + i }));

    const Mode = Object.freeze({ SONGS: "songs", GOAL: "goal", PLAYLIST: "playlist" });
    let currentMode = Mode.SONGS;

    let currentButtonEl = null;
    let lastPlayed = null;   // { src, label }
    let pendingGoal = null;  // { src, label, buttonEl }

    // Store Blob URLs generated from the offline cache so we don't cause memory leaks
    const blobUrlCache = new Map();

    // Hybrid playback: HTMLAudioElement routed through Web Audio GainNode for Safari-safe output + smooth fades
    let currentAudioEl = null;
    let audioCtx = null;
    let currentMediaNode = null;
    let currentGainNode = null;
    let fadeTimer = null;
    let audioUnlocked = false;

    const grid = document.getElementById("grid");
    const status = document.getElementById("status");
    const modeBanner = document.getElementById("modeBanner");

    const songsTab    = document.getElementById("songsTab");
    const goalTab     = document.getElementById("goalTab");
    const playlistTab = document.getElementById("playlistTab");
    const stopBtn     = document.getElementById("stopBtn");
    const cacheBtn    = document.getElementById("cacheBtn");

    const confirmBar = document.getElementById("confirmBar");
    const confirmText = document.getElementById("confirmText");
    const confirmCancel = document.getElementById("confirmCancel");
    const confirmGo = document.getElementById("confirmGo");

    /*****************************************************************
     * Custom Colors State & UI
     *****************************************************************/
    const colorPalette = [
      { name: 'Red', bg: '#ffebee', border: '#ef9a9a' },
      { name: 'Orange', bg: '#fff3e0', border: '#ffcc80' },
      { name: 'Yellow', bg: '#fffde7', border: '#fff59d' },
      { name: 'Green', bg: '#e8f5e9', border: '#a5d6a7' },
      { name: 'Blue', bg: '#e3f2fd', border: '#90caf9' },
      { name: 'Purple', bg: '#f3e5f5', border: '#ce93d8' },
      { name: 'Pink', bg: '#fce4ec', border: '#f48fb1' },
      { name: 'Gray', bg: '#f5f5f5', border: '#e0e0e0' }
    ];

    let cardColors = JSON.parse(localStorage.getItem('lax-card-colors') || '{}');
    let targetDragIdForColor = null;
    let isColorPickerRecent = false; // Prevent accidental clicks just after closing

    function initColorPicker() {
      const container = document.getElementById('swatchContainer');
      
      // Default (Reset) Swatch
      const defSwatch = document.createElement('div');
      defSwatch.className = 'color-swatch default-swatch';
      defSwatch.innerHTML = '&times;';
      defSwatch.onclick = () => selectColor(null, null);
      container.appendChild(defSwatch);

      // Color Swatches
      colorPalette.forEach(c => {
        const el = document.createElement('div');
        el.className = 'color-swatch';
        el.style.background = c.bg;
        el.style.borderColor = c.border;
        el.onclick = () => selectColor(c.bg, c.border);
        container.appendChild(el);
      });
    }

    function openColorPicker(dragId) {
      targetDragIdForColor = dragId;
      document.getElementById('colorPickerOverlay').style.display = 'flex';
      
      // Temporarily block card clicks so releasing the long press doesn't instantly play audio
      isColorPickerRecent = true; 
      setTimeout(() => isColorPickerRecent = false, 500);
    }

    function closeColorPicker() {
      document.getElementById('colorPickerOverlay').style.display = 'none';
      targetDragIdForColor = null;
    }

    function selectColor(bg, border) {
      if (!targetDragIdForColor) return;
      if (bg === null) {
        delete cardColors[targetDragIdForColor];
      } else {
        cardColors[targetDragIdForColor] = { bg, border };
      }
      localStorage.setItem('lax-card-colors', JSON.stringify(cardColors));
      renderGrid(); 
      closeColorPicker();
    }


    function setStatus(text){ status.textContent = text || ""; }

    function flashButton(el){
      if(!el) return;
      el.classList.add("flash");
      setTimeout(() => el.classList.remove("flash"), 140);
    }

    function clearPlayingHighlight(){
      if(currentButtonEl){
        currentButtonEl.classList.remove("playing");
        currentButtonEl.style.removeProperty('--progress'); // Reset the progress ring
        currentButtonEl = null;
      }
    }

    function stopImmediate(){
      if (fadeTimer){
        clearInterval(fadeTimer);
        fadeTimer = null;
      }

      // Stop audio element
      if (currentAudioEl){
        try { currentAudioEl.pause(); } catch(e){}
        try { currentAudioEl.currentTime = 0; } catch(e){}
      }

      // Disconnect Web Audio nodes
      if (currentMediaNode){
        try { currentMediaNode.disconnect(); } catch(e){}
        currentMediaNode = null;
      }
      if (currentGainNode){
        try { currentGainNode.disconnect(); } catch(e){}
        currentGainNode = null;
      }

      currentAudioEl = null;
      clearPlayingHighlight();
      setStatus("");
    }

    function ensureAudioContext(){
      if (!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    async function unlockAudio(){
      const ctx = ensureAudioContext();
      if (ctx.state === "suspended"){
        try { await ctx.resume(); } catch(e){}
      }
      if (audioUnlocked) return;
      try {
        const buffer = ctx.createBuffer(1, 1, ctx.sampleRate);
        const src = ctx.createBufferSource();
        src.buffer = buffer;
        src.connect(ctx.destination);
        src.start(0);
      } catch(e){}
      audioUnlocked = true;
    }

    function stopWithFade(){
      if (!currentAudioEl){
        stopImmediate();
        return;
      }

      // Remove the active UI immediately so it feels responsive to the user
      clearPlayingHighlight();

      if (fadeTimer){
        clearInterval(fadeTimer);
        fadeTimer = null;
      }

      const audio = currentAudioEl;
      const totalMs = Math.max(300, Math.round(FADE_TOTAL_SEC * 1000));
      const holdMs  = Math.max(0, Math.min(totalMs - 50, Math.round(FADE_HOLD_SEC * 1000)));
      const startTs = performance.now();

      // Prefer GainNode fade when available
      const hasGain = !!(currentGainNode && audioCtx);
      const startGain = hasGain ? (currentGainNode.gain.value || 1) : (audio.volume ?? 1);

      fadeTimer = setInterval(() => {
        const t = performance.now() - startTs;

        if (t <= holdMs){
          if (hasGain) currentGainNode.gain.value = startGain;
          else audio.volume = startGain;
          return;
        }

        const p = Math.min(1, (t - holdMs) / Math.max(1, (totalMs - holdMs)));
        // Super-smooth curve: smoothstep -> cosine
        const smooth = p * p * (3 - 2 * p);
        const cosine = 0.5 - 0.5 * Math.cos(Math.PI * smooth);
        const v = Math.max(0.0001, startGain * (1 - cosine));

        if (hasGain) currentGainNode.gain.value = v;
        else audio.volume = v;

        if (p >= 1){
          clearInterval(fadeTimer);
          fadeTimer = null;
          stopImmediate();
        }
      }, 33);
    }

    async function playAudio(src, label, buttonEl){
      stopImmediate();

      // Ensure Safari output is unlocked on a user gesture
      await unlockAudio();
      const ctx = ensureAudioContext();
      if (ctx.state === "suspended"){
        try { await ctx.resume(); } catch(e){}
      }

      // Check for offline cached version first!
      let finalSrc = src;
      try {
        if ('caches' in window) {
          const cache = await caches.open('lax-audio-v1');
          const cachedRes = await cache.match(src);
          
          if (cachedRes) {
            // Already cached, convert to local Blob URL so it bypasses network completely
            if (blobUrlCache.has(src)) {
              finalSrc = blobUrlCache.get(src);
            } else {
              const blob = await cachedRes.blob();
              finalSrc = URL.createObjectURL(blob);
              blobUrlCache.set(src, finalSrc);
            }
          } else {
            // Not in cache, fetch it passively in background so it's ready next time
            fetch(src).then(res => {
              if (res.ok) cache.put(src, res.clone());
            }).catch(() => console.log("Background cache failed (offline)"));
          }
        }
      } catch(e) { console.warn("Cache API Error:", e); }

      const audio = new Audio(finalSrc);
      audio.preload = "auto";
      audio.volume = 1.0;
      audio.muted = false;
      audio.playsInline = true;
      currentAudioEl = audio;

      // Track playback progress and inject to CSS Variable
      const updateProgress = () => {
        if (audio === currentAudioEl && buttonEl) {
          const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
          buttonEl.style.setProperty('--progress', `${pct}%`);
        }
      };
      audio.addEventListener('timeupdate', updateProgress);

      // Helpful error reporting (Safari will throw decode/MIME issues here)
      audio.addEventListener("error", () => {
        const code = audio?.error?.code;
        const fullUrl = new URL(src, window.location.href).href; // Display original source for clarity
        setStatus(`Audio error (code ${code || "?"}): ${fullUrl}`);
        clearPlayingHighlight();
      });

      // Route through Web Audio GainNode so fades are consistent
      try {
        currentGainNode = ctx.createGain();
        currentGainNode.gain.setValueAtTime(1.0, ctx.currentTime);
        currentGainNode.connect(ctx.destination);

        currentMediaNode = ctx.createMediaElementSource(audio);
        currentMediaNode.connect(currentGainNode);
      } catch(e){
        // If MediaElementSource fails, fall back to plain audio element
        currentMediaNode = null;
        currentGainNode = null;
      }

      if (buttonEl){
        currentButtonEl = buttonEl;
        buttonEl.classList.add("playing");
      }

      setStatus(`Loading: ${label}`);

      audio.addEventListener("ended", () => {
        if (currentAudioEl === audio){
          stopImmediate();
        }
      });

      try {
        await audio.play();
        lastPlayed = { src, label };
        setStatus(`Playing: ${label}`);
      } catch (err){
        console.error("PLAY ERROR:", err);
        setStatus(`Playback blocked: tap again (${err?.name || "error"})`);
      }
    }

    // New Offline Sync function to download all tracks
    async function syncOffline() {
      if (!('caches' in window)) {
        setStatus("Offline caching not supported in this browser.");
        return;
      }
      cacheBtn.disabled = true;
      const originalText = cacheBtn.textContent;

      try {
        const cache = await caches.open('lax-audio-v1');
        const allUrls = [];

        players.forEach(p => {
          if (!MISSING_SONG_NUMS.has(p.num)) allUrls.push(`${AUDIO_BASE}/songs/${p.songFile}`);
          allUrls.push(`${AUDIO_BASE}/goals/${p.goalFile}`);
        });
        extras.forEach(x => {
          allUrls.push(`${AUDIO_BASE}/songs/${x.songFile}`);
          allUrls.push(`${AUDIO_BASE}/goals/${x.goalFile}`);
        });
        playlist.forEach(s => {
          allUrls.push(`${AUDIO_BASE}/playlist/${encodeURIComponent(s.file)}`);
        });

        let loaded = 0;
        let failed = 0;

        for (let i = 0; i < allUrls.length; i++) {
          const url = allUrls[i];
          const pct = Math.round(((i + 1) / allUrls.length) * 100);
          cacheBtn.textContent = `Syncing ${pct}%`;
          
          const displayUrl = decodeURIComponent(url.split('/').pop());
          setStatus(`Caching (${i+1}/${allUrls.length}): ${displayUrl}`);

          try {
            const existing = await cache.match(url);
            if (!existing) {
              const res = await fetch(url);
              if (res.ok) {
                await cache.put(url, res);
                loaded++;
              } else {
                failed++;
              }
            } else {
              loaded++;
            }
          } catch(e) {
            failed++;
          }
        }

        setStatus(`Sync complete! ${loaded} tracks ready for offline. ${failed > 0 ? failed + ' failed.' : ''}`);
        cacheBtn.textContent = "Offline Ready \u2713";
        setTimeout(() => { cacheBtn.textContent = originalText; }, 5000);
      } catch(e) {
        setStatus(`Sync failed: ${e.message}`);
        cacheBtn.textContent = originalText;
      }
      cacheBtn.disabled = false;
    }

    function showConfirmBar(text){
      confirmText.textContent = text;
      confirmBar.style.display = "block";
    }

    function hideConfirmBar(){
      confirmBar.style.display = "none";
      pendingGoal = null;
    }

    function setMode(mode){
      currentMode = mode;

      if(mode === Mode.SONGS){
        modeBanner.textContent = "SONG MODE";
        modeBanner.className = "banner song";
        songsTab.classList.add("active");
        goalTab.classList.remove("active");
        playlistTab.classList.remove("active");
        hideConfirmBar();
      } else if(mode === Mode.GOAL){
        modeBanner.textContent = "GOAL MODE";
        modeBanner.className = "banner goal";
        goalTab.classList.add("active");
        songsTab.classList.remove("active");
        playlistTab.classList.remove("active");
      } else {
        modeBanner.textContent = "PLAYLIST MODE";
        modeBanner.className = "banner playlist";
        playlistTab.classList.add("active");
        songsTab.classList.remove("active");
        goalTab.classList.remove("active");
        hideConfirmBar();
      }

      renderGrid();
      setStatus("");
    }

    /* DRAG AND DROP HANDLERS */
    let dragSrcEl = null;
    let isDraggingOrMoved = false; // Used to separate dragging from long-press coloring

    function handleDragStart(e) {
      isDraggingOrMoved = true;
      dragSrcEl = this;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/html', this.innerHTML);
      this.classList.add('dragging');
    }

    function handleDragOver(e) {
      if (e.preventDefault) {
        e.preventDefault(); // Allows drop
      }
      e.dataTransfer.dropEffect = 'move';
      return false;
    }

    function handleDragEnter(e) {
      if (this !== dragSrcEl) {
        this.classList.add('over');
      }
    }

    function handleDragLeave(e) {
      this.classList.remove('over');
    }

    function handleDrop(e) {
      if (e.stopPropagation) {
        e.stopPropagation();
      }
      if (dragSrcEl !== this) {
        // 1. Reorder DOM visually
        const gridNodes = Array.from(grid.children);
        const srcIndex = gridNodes.indexOf(dragSrcEl);
        const destIndex = gridNodes.indexOf(this);

        if (srcIndex < destIndex) {
          this.parentNode.insertBefore(dragSrcEl, this.nextSibling);
        } else {
          this.parentNode.insertBefore(dragSrcEl, this);
        }

        // 2. Save order state so it persists across tab switches
        const activeLayout = currentMode === Mode.PLAYLIST ? playlistLayout : songsLayout;
        const newOrder = Array.from(grid.children).map(c => c.dataset.dragId);
        activeLayout.sort((a, b) => newOrder.indexOf(a._dragId) - newOrder.indexOf(b._dragId));
      }
      return false;
    }

    function handleDragEnd(e) {
      this.classList.remove('dragging');
      const cards = grid.querySelectorAll('.card');
      cards.forEach(c => c.classList.remove('over'));
    }

    function makeCard({ top, bottom, isMissing, dragId, onClick }){
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.dragId = dragId;
      card.setAttribute('draggable', 'true'); // Enables drag and drop

      // Apply assigned colors if they exist
      if (cardColors[dragId]) {
        card.style.setProperty('--custom-bg', cardColors[dragId].bg);
        card.style.setProperty('--custom-border', cardColors[dragId].border);
        card.classList.add('has-custom-color');
      }

      if(currentMode === Mode.SONGS)    card.classList.add("songModeTint");
      if(currentMode === Mode.GOAL)     card.classList.add("goalModeTint");
      if(currentMode === Mode.PLAYLIST) card.classList.add("playlistModeTint");
      if(isMissing) card.classList.add("missing");

      const num = document.createElement("div");
      num.className = "num";
      num.textContent = top;

      const name = document.createElement("div");
      name.className = "name";
      name.textContent = bottom;

      card.appendChild(num);
      card.appendChild(name);

      // Add the active playing overlay with progress ring & pause icon
      const playOverlay = document.createElement("div");
      playOverlay.className = "play-overlay";
      playOverlay.innerHTML = `
        <div class="progress-ring">
          <div class="progress-ring-inner">
            <div class="pause-bar"></div>
            <div class="pause-bar"></div>
          </div>
        </div>
      `;
      card.appendChild(playOverlay);

      // --- Custom Long-Press Color Picker Logic ---
      let longPressTimer;
      let longPressed = false;

      function startPress(e) {
        if (e.button !== undefined && e.button !== 0) return; // Only process main touch/click
        isDraggingOrMoved = false;
        longPressed = false;
        longPressTimer = setTimeout(() => {
          longPressed = true;
        }, 500); // 500ms hold
      }

      function movePress() {
        isDraggingOrMoved = true;
        clearTimeout(longPressTimer);
        longPressed = false;
      }

      function endPress(e) {
        clearTimeout(longPressTimer);
        // If we held for 500ms and DID NOT trigger a move/drag, open color picker
        if (longPressed && !isDraggingOrMoved) {
          e.preventDefault();
          e.stopPropagation();
          openColorPicker(dragId);
        }
        longPressed = false;
      }

      // Touch & Mouse bindings for the custom long-press detection
      card.addEventListener('touchstart', startPress, {passive: true});
      card.addEventListener('touchmove', movePress, {passive: true});
      card.addEventListener('touchend', endPress);
      
      card.addEventListener('mousedown', startPress);
      card.addEventListener('mousemove', movePress);
      card.addEventListener('mouseup', endPress);

      // Standard desktop Right-Click binding
      card.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        openColorPicker(dragId);
      });

      // Standard Click / Play Event
      card.addEventListener("click", () => {
        // Prevent audio from playing if we just closed the color picker or just long-pressed
        if (isColorPickerRecent || longPressed) return;

        flashButton(card);
        // If clicking the button that is already playing, stop/fade it
        if (card === currentButtonEl && currentAudioEl && !currentAudioEl.paused) {
          stopWithFade();
          return;
        }
        onClick(card);
      });

      // Drag Events
      card.addEventListener('dragstart', handleDragStart);
      card.addEventListener('dragenter', handleDragEnter);
      card.addEventListener('dragover',  handleDragOver);
      card.addEventListener('dragleave', handleDragLeave);
      card.addEventListener('drop',      handleDrop);
      card.addEventListener('dragend',   handleDragEnd);

      return card;
    }

    function renderGrid(){
      grid.innerHTML = "";

      if(currentMode === Mode.PLAYLIST){
        grid.classList.add("playlist-grid");
        // iPad landscape = ~1024px. 6 cols, 8px gaps = ~158px per card.
        // Target 5 rows of ~110px = fits in ~650px content height.
        for(const s of playlistLayout){
          const src = `${AUDIO_BASE}/playlist/${encodeURIComponent(s.file)}`;
          const label = s.artist ? `${s.title} — ${s.artist}` : s.title;
          const displayTitle = s.title
            .replace(/\s*\(Instrumental[^)]*\)/gi, '')
            .replace(/\s*\[Instrumental[^\]]*\]/gi, '')
            .replace(/\s*\(feat\.[^)]*\)/gi, '')
            .trim();
          const card = makeCard({
            top: displayTitle,
            bottom: s.artist,
            isMissing: false,
            dragId: s._dragId,
            onClick: (el) => {
              playAudio(src, label, el);
            }
          });
          // Shrink font for long titles so they don't wrap to 3 lines
          const numEl = card.querySelector('.num');
          if(numEl){
            if(displayTitle.length > 30)      numEl.style.fontSize = '11px';
            else if(displayTitle.length > 18) numEl.style.fontSize = '13px';
          }
          grid.appendChild(card);
        }
        return;
      }

      grid.classList.remove("playlist-grid");
      for(const item of songsLayout){
        let topText, bottomText, songSrc, goalSrc, label, isMissing = false;

        if (item._type === 'player') {
          songSrc = `${AUDIO_BASE}/songs/${item.songFile}`;
          goalSrc = `${AUDIO_BASE}/goals/${item.goalFile}`;
          label = `#${item.num} ${item.name}`;
          isMissing = MISSING_SONG_NUMS.has(item.num);
          topText = isMissing ? `-${item.num}-` : String(item.num);
          bottomText = item.name;
        } else {
          // Extra item
          songSrc = `${AUDIO_BASE}/songs/${item.songFile}`;
          goalSrc = `${AUDIO_BASE}/goals/${item.goalFile}`;
          label = item.labelBottom ? `${item.labelBottom}` : item.labelTop;
          topText = item.labelTop;
          bottomText = item.labelBottom || "";
        }

        const card = makeCard({
          top: topText,
          bottom: bottomText,
          isMissing,
          dragId: item._dragId,
          onClick: (el) => {
            if(currentMode === Mode.SONGS){
              playAudio(songSrc, label, el);
            } else {
              pendingGoal = { src: goalSrc, label: `Confirm GOAL call: ${label}`, buttonEl: el };
              showConfirmBar(pendingGoal.label);
            }
          }
        });

        grid.appendChild(card);
      }
    }

    // Controls
    songsTab.addEventListener("click",    () => setMode(Mode.SONGS));
    goalTab.addEventListener("click",     () => setMode(Mode.GOAL));
    playlistTab.addEventListener("click", () => setMode(Mode.PLAYLIST));
    cacheBtn.addEventListener("click",    () => syncOffline());

    stopBtn.addEventListener("click", () => {
      // Make it obvious the click registered
      const originalText = stopBtn.textContent;
      stopBtn.classList.add("stopping");
      stopBtn.textContent = "Stopping…";
      stopBtn.disabled = true;
      setStatus("Stopping…");

      stopWithFade();
      hideConfirmBar();

      const ms = Math.ceil(Math.max(0.5, FADE_TOTAL_SEC) * 1000) + 250;
      setTimeout(() => {
        stopBtn.classList.remove("stopping");
        stopBtn.textContent = originalText;
        stopBtn.disabled = false;
      }, ms);
    });

    confirmCancel.addEventListener("click", () => {
      hideConfirmBar();
      setStatus("");
    });

    confirmGo.addEventListener("click", () => {
      if(!pendingGoal) return;
      const { src, label, buttonEl } = pendingGoal;
      hideConfirmBar();
      playAudio(src, label.replace("Confirm ", ""), buttonEl);
    });

    // Initial render
    initColorPicker();
    renderGrid();
    setMode(Mode.SONGS);
  </script>
</body>
</html>
