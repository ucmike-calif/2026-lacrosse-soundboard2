<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  
  <!-- Apple Web App / PWA Meta Tags for full-screen iPad experience -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Lax Board" />
  
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>Lacrosse Soundboard</title>
  <style>
    :root{
      --bg: #ffffff;
      --text: #111;
      --muted: #555;
      --border: #d9d9d9;

      --green: #0b7a30;
      --greenTint: rgba(11,122,48,0.10);

      --red: #b30000;
      --redTint: rgba(179,0,0,0.10);

      --purple: #5b2d8e;
      --purpleTint: rgba(91,45,142,0.10);

      --btnBg: #fff;
      --btnBorder: #cfcfcf;
      --btnShadow: rgba(0,0,0,0.08);
    }

    body{
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      /* Prevent text selection and bouncing on iPad */
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior-y: none;
    }

    header{
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      /* Add safe-area padding for modern iPads/iPhones */
      padding-top: max(14px, env(safe-area-inset-top));
    }

    h1{
      margin: 0 0 10px 0;
      font-size: 26px;
      line-height: 1.1;
    }

    .banner{
      width: 100%;
      border-radius: 10px;
      padding: 14px 16px;
      font-weight: 800;
      text-align: center;
      letter-spacing: 1px;
      font-size: 20px;
      color: #fff;
      user-select: none;
    }
    .banner.song{ background: var(--green); }
    .banner.goal{ background: var(--red); }
    .banner.playlist{ background: var(--purple); }

    .tabbtn .playlistText{ color: var(--purple); font-weight: 800; }

    .toolbar{
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .tabbtn, .ctlbtn{
      border: 1px solid var(--btnBorder);
      background: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 16px;
      cursor: pointer;
      user-select: none;
      box-shadow: 0 2px 8px var(--btnShadow);
    }

    .ctlbtn:disabled{
      opacity: 0.85;
      cursor: default;
    }

    /* Stop button should look like a stop sign */
    #stopBtn{
      background: var(--red);
      color: #fff;
      border-color: rgba(0,0,0,0.10);
      font-weight: 800;
    }

    /* Visual feedback when Stop has been clicked */
    #stopBtn.stopping{
      background: #7f0000;
      border-color: rgba(0,0,0,0.20);
      outline: 2px solid rgba(0,0,0,0.20);
    }
    
    #cacheBtn {
      font-weight: 600;
      color: #333;
    }

    .tabbtn.active{
      outline: 2px solid rgba(0,0,0,0.06);
    }

    .tabbtn .songsText{ color: var(--green); font-weight: 800; }
    .tabbtn .goalText{ color: var(--red); font-weight: 800; }

    .status{
      padding: 10px 16px 0;
      color: var(--muted);
      font-size: 15px;
      min-height: 22px;
    }

    .gridwrap{
      padding: 12px 16px 16px;
      /* Add safe padding for bottom of iPad screens */
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }
    .grid{
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(6, minmax(130px, 1fr));
    }

    @media (max-width: 1100px){
      .grid{ grid-template-columns: repeat(4, minmax(140px, 1fr)); }
    }
    @media (max-width: 750px){
      .grid{ grid-template-columns: repeat(3, minmax(120px, 1fr)); }
    }
    @media (max-width: 520px){
      .grid{ grid-template-columns: repeat(2, minmax(140px, 1fr)); }
    }

    /* Playlist-specific grid: more columns, tighter */
    @media (max-width: 750px){
      .grid.playlist-grid{ grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 520px){
      .grid.playlist-grid{ grid-template-columns: repeat(3, 1fr); }
    }

    .card{
      border: 1px solid var(--btnBorder);
      border-radius: 14px;
      background: var(--btnBg);
      box-shadow: 0 6px 14px var(--btnShadow);
      padding: 10px;
      user-select: none;
      cursor: pointer;
      position: relative;
      transition: transform 0.05s ease, background 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
      
      /* Enhance touch dragging */
      touch-action: manipulation;
      -webkit-touch-callout: none;
      -webkit-user-drag: element;
    }

    /* Ensures drag events properly trigger on the main card container */
    .card > * {
      pointer-events: none;
    }

    /* Drag and Drop visual feedback */
    .card.dragging {
      opacity: 0.4;
      transform: scale(0.95);
    }
    .card.over {
      transform: scale(1.03);
      outline: 3px dashed var(--active-theme);
      outline-offset: -3px;
      opacity: 0.8;
    }

    /* Playlist-specific grid: 6 columns, tight gaps */
    .grid.playlist-grid{
      gap: 6px;
      grid-template-columns: repeat(6, 1fr);
    }

    /* Playlist cards */
    .playlist-grid .card{
      border-radius: 8px !important;
      padding: 6px !important;
      box-shadow: 0 2px 5px var(--btnShadow) !important;
      height: 110px !important;
      box-sizing: border-box !important;
      display: flex !important;
      flex-direction: column !important;
      justify-content: center !important;
      overflow: hidden !important;
    }
    .playlist-grid .num{
      font-size: 17px !important;
      font-weight: 800 !important;
      padding: 8px 6px !important;
      border: 1px solid var(--btnBorder) !important;
      background: rgba(255,255,255,0.9) !important;
      border-radius: 7px !important;
      line-height: 1.25 !important;
      display: -webkit-box !important;
      -webkit-line-clamp: 2 !important;
      -webkit-box-orient: vertical !important;
      overflow: hidden !important;
    }
    .playlist-grid .name{
      font-size: 11px !important;
      font-weight: 400 !important;
      margin-top: 4px !important;
      min-height: 0 !important;
      white-space: nowrap !important;
      overflow: hidden !important;
      text-overflow: ellipsis !important;
      color: #555 !important;
    }

    /* Card Mode Themes */
    .card.songModeTint{ 
      background: var(--greenTint); 
      --active-theme: var(--green);
    }
    .card.playlistModeTint{ 
      background: var(--purpleTint); 
      --active-theme: var(--purple);
    }

      --active-theme: var(--
